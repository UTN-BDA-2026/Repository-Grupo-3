server {
    listen 80;
    server_name saloneventos.cloud;

    #compresion gzip para mejorar el rendimiento
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
        #cache para archivos js y css
        location ~* \.(js|css)$ {           
            expires 7d;
            add_header Cache-Control "public, no-transform";
            }
        #cache para imagenes
        location ~* \.(jpg|jpeg|png|gif|svg|webp|ico)$ {
            expires 30d;
            add_header Cache-Control "public, no-transform";
            
            #reduce tamaño de respuesta en headers
            add_header Vary Accept-Encoding;
        }

    }

    location /uploads/ {
        root /usr/share/nginx/html;
        # Esto es clave para que no intente ejecutar nada, solo servir la imagen
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }
}