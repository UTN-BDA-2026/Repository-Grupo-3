services:
  db:
    image: postgres:15.6
    container_name: salon_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DEV_DB}
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db_init:/docker-entrypoint-initdb.d
    networks:
      - red1
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DEV_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.0
    container_name: redis_service
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    env_file:
      - .env
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    networks:
      - red1
    restart: always
  
  pgadmin:
    image: dpage/pgadmin4
    container_name: salon_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@salon.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    networks:
      - red1
    depends_on:
      db:
        condition: service_healthy
    restart: always

  app:
    container_name: salon_app
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_IDS=${TELEGRAM_CHAT_IDS}
    networks:
      - red1
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    labels:
      - "traefik.enable=true"
      # Cambiado a localhost
      - "traefik.http.routers.salonapp.rule=Host(`localhost`) && PathPrefix(`/api`)"
      - "traefik.http.routers.salonapp.entrypoints=web"
      - "traefik.http.services.salonapp.loadbalancer.server.port=5000"

  frontend:
    container_name: salon_frontend
    build:
      context: ../frontend
      dockerfile: Dockerfile
    networks:
      - red1
    labels:
      - "traefik.enable=true"
      # Cambiado a localhost
      - "traefik.http.routers.frontend.rule=Host(`localhost`)"
      - "traefik.http.routers.frontend.entrypoints=web"
      - "traefik.http.services.frontend.loadbalancer.server.port=80"

  traefik:
    image: traefik:v2.11
    container_name: traefik
    environment:
      - DOCKER_API_VERSION=1.44
    command:
      - "--api.insecure=true" # Habilitado el dashboard de Traefik sin autenticación (solo para desarrollo)
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    networks:
      - red1
    restart: always

networks:
  red1:
    driver: bridge

volumes:
  postgres_data: